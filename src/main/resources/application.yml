server:
  port: 8082

spring:
  application:
    name: slot-game-controller-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gamecontroller}
    username: ${DB_USER:gamecontroller}
    password: ${DB_PASSWORD:gamecontroller}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

services:
  bank:
    url: ${BANK_SERVICE_URL:http://localhost:8084}
  game-engine:
    url: ${GAME_ENGINE_SERVICE_URL:http://localhost:8083}

auth:
  jwks-uri: ${AUTH_SERVICE_JWKS_URL:http://localhost:8081/.well-known/jwks.json}

management:
  cloudfoundry:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      bankService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      gameEngineService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      bankService:
        maxAttempts: 3
        waitDuration: 500ms
      gameEngineService:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      bankService:
        timeoutDuration: 5s
      gameEngineService:
        timeoutDuration: 5s

reconciliation:
  retry-interval-ms: 60000

logging:
  level:
    com.slotcentral: DEBUG
